  async function streamBodies() {
    const output = document.getElementById("output");
    const index = document.getElementById("index");

    for (const url of urls) {

      // Create a stable anchor ID for this section
      const anchorId = "section-" + btoa(url).replace(/=/g, "");

      // Add link to index
      const indexLink = document.createElement("a");
      indexLink.href = "#" + anchorId;
      indexLink.textContent = url;
      index.appendChild(indexLink);

      // Create wrapper div FIRST so it always appears
      const wrapper = document.createElement("div");
      wrapper.className = "wrapper";
      wrapper.id = anchorId;  // anchor target

      // Add clickable title link
      const title = document.createElement("a");
      title.href = url;
      title.textContent = url;
      title.className = "title-link";
      wrapper.appendChild(title);

      // Create content container
      const content = document.createElement("div");
      wrapper.appendChild(content);

      // Append wrapper immediately
      output.appendChild(wrapper);

      try {
        const res = await fetch(url);
        const html = await res.text();

        const doc = new DOMParser().parseFromString(html, "text/html");
        const bodyContent = doc.body ? doc.body.innerHTML : "";

        content.innerHTML = bodyContent;

      } catch (err) {
        content.textContent = `Error loading ${url}: ${err}`;
      }
    }
  }

  // Copy All button — copies HTML, not plain text
  document.getElementById("copyBtn").addEventListener("click", async () => {
    const outputText = document.getElementById("output").innerText;
    try {
      await navigator.clipboard.writeText(outputText);
      alert("Text copied to clipboard");
    } catch (err) {
      alert("Copy failed: " + err);
    }
  });

  streamBodies();
